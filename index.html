<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">

        <div class="logo">
            <img src="maker.png" alt="logo">
            <h2>Coffee Shop</h2>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search">
        </div>

    </nav>

    <section class="hero">

        <div class="hero-text">

            <h1>
                Fresh Coffee <br>
                In The Morning
            </h1>

            <p>
                Start your day with rich and aromatic coffee made
                from the finest coffee beans. Enjoy every sip with
                freshness and flavor.
            </p>

            <button>Order Now</button>

        </div>

        <div class="hero-image">

            <img src="https://media.istockphoto.com/id/508347326/photo/happy-coffee-cup.jpg?s=612x612&w=0&k=20&c=VddFWLomZ_Wv_vvX7-nVsSD9Zze5CXFt6mKGgU7R10c="
                alt="Coffee">

        </div>

    </section>

</body>
</html>
